## xyloTermux neofetch config
## ~/.config/neofetch/config.conf

print_info() {
    info title
    info underline

    info "󰣇  OS" distro
    info "  Host" model
    info "  Kernel" kernel
    info "  Uptime" uptime
    info "  Packages" packages
    info "  Shell" shell
    info "  Terminal" term
    info "  CPU" cpu
    info "  Memory" memory
    info "  Storage" disk
    info "  Battery" battery
    info cols
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="on"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="on"
memory_unit="mib"

# Packages
package_managers="on"

# Shell
shell_path="off"
shell_version="on"

# CPU
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# Disk
disk_show=('/')
disk_subtitle="name"
disk_percent="on"

# Battery
battery_display="infobar"

# Colors
colors=(4 5 6 2 3 1)
bold="on"
underline_enabled="on"
underline_char="─"
separator="  "

# Text Colors
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

# Progress Bars
bar_char_elapsed="━"
bar_char_total="─"
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

# Info colors
info_color="distro"

# Backend Settings
image_backend="ascii"
image_source="auto"
ascii_distro="Android"
ascii_colors=(4 5 6)
ascii_bold="on"

# Stdout mode
stdout="off"
